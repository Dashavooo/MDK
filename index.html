<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Уралсиб</title>
    <link rel="stylesheet"
          href="style.css">
</head>
<body>

<div class="container">

    <!-- Левая панель -->
    <div class="left-panel">
        <h1 class="logo">Уралсиб</h1>

        <input type="text" placeholder="ЛОГИН">
        <input type="password" placeholder="ПАРОЛЬ">

        <div class="remember">
            <label>
                <input type="checkbox"> Запомнить логин
            </label>
        </div>

        <button class="btn">АВТОРИЗОВАТЬСЯ</button>

        <p class="info-text">Это длинный текст перед... 😉</p>

        <button class="btn secondary">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>

    <!-- Центральная часть -->
    <div class="center-panel">
        <h2>УМНАЯ СИСТЕМА ПЕРЕВОДОВ<br>С ВНЕДРЕНИЕМ СОВРЕМЕННЫХ ИИ!</h2>

        <div class="card-form">
            <h3>Уралсиб Business</h3>

            <input type="text" placeholder="НОМЕР КАРТЫ">

            <div class="row">
                <input type="text" placeholder="MM/ГГ">
                <input type="text" placeholder="CVC/CVV">
            </div>

            <label>Сумма перевода</label>
            <input type="text">

            <label>Сообщение получателю</label>
            <input type="text">

            <button class="btn">ПЕРЕВЕСТИ</button>
        </div>
    </div>

    <!-- Правая панель -->
    <div class="right-panel">
        <h3>НАМ ДОВЕРЯЮТ</h3>
        <div class="logos">
            <div class="logo-box">FedEx</div>
            <div class="logo-box">Hallmark</div>
            <div class="logo-box">Castbury</div>
            <div class="logo-box">Apollo</div>
            <div class="logo-box">Rocket</div>
        </div>
    </div>

</div>

</body>
</html>
